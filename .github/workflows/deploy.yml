name: Deploy no GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissões necessárias para publicar no Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Um deploy por vez; um push mais novo supersede um deploy travado na fila do Pages
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Guardrails (métricas, faixas, progressão, regras, design, contraste...)
        # Trava a publicação se um guardrail falhar. check:progressao garante que a
        # prescrição progride de verdade (fim do "mesmo treino toda semana"); os demais
        # protegem métricas, faixas citadas, referências, legibilidade e contraste.
        run: npm run check

      - name: Build (base = /<repo>/)
        env:
          # base do Vite no site de projeto do Pages: "/<nome-do-repo>/"
          VITE_BASE: /${{ github.event.repository.name }}/
          # Backend Supabase: liga o login em nuvem no site publicado. Um secret
          # definido em Settings > Secrets and variables > Actions tem precedência;
          # senão usa o valor publicável abaixo. A chave PUBLICÁVEL (anon/public) já
          # vai para o bundle do cliente por design e é protegida por RLS; NUNCA a
          # secreta (sb_secret_).
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://asbaydbxujgsnowmfmbe.supabase.co' }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || 'sb_publishable_9qlzoZgQeRe__8kbVQVDfQ_aHlgOb6H' }}
        run: npm run build

      - name: Configurar Pages
        uses: actions/configure-pages@v5

      - name: Upload do artefato
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy no Pages
        id: deployment
        uses: actions/deploy-pages@v4

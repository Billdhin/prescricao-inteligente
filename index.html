<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="theme-color" content="#2563EB" />
    <title>Prescrição Inteligente | Treino seguro para alunos com comorbidade</title>
    <!-- SPA para GitHub Pages: restaura a rota codificada pelo 404.html (rafgraph/spa-github-pages) -->
    <script type="text/javascript">
      (function (l) {
        if (l.search[1] === "/") {
          var decoded = l.search
            .slice(1)
            .split("&")
            .map(function (s) {
              return s.replace(/~and~/g, "&");
            })
            .join("?");
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
        }
      })(window.location);
    </script>
    <meta
      name="description"
      content="Apoio à decisão para profissionais de Educação Física: monte um treino seguro para alunos com hipertensão, diabetes, obesidade, dor lombar ou idade avançada, com o porquê de cada exercício documentado. A decisão é sempre sua."
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
